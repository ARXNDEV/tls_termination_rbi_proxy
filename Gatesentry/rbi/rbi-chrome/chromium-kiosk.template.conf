; Rendered by entrypoint.sh (envsubst ${ALLOWED_URL}) -> /etc/neko/supervisord/chromium.conf
; A COMPLETE Chromium runs in the container, but the client view is KIOSK-LOCKED to
; the one allowed URL: no tabs, no address bar, no new-tab — can't navigate away.
[program:chromium]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/chromium --no-sandbox --window-position=0,0 --start-fullscreen --kiosk --app=${ALLOWED_URL} --display=%(ENV_DISPLAY)s --user-data-dir=/home/neko/.config/chromium --no-first-run --force-dark-mode --disable-gpu --disable-software-rasterizer --disable-dev-shm-usage --disable-file-system --disable-pinch --overscroll-history-navigation=0 --disable-extensions --disable-component-extensions-with-background-pages --no-default-browser-check
stopsignal=INT
autorestart=true
priority=800
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/chromium.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:openbox]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/openbox --config-file /etc/neko/openbox.xml
autorestart=true
priority=300
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/openbox.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

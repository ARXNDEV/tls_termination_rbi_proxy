# Minimal TURN config. Host-specific + the relay PORT RANGE are passed as flags
# by docker-compose from rbi.env (single source of truth), so nothing drifts:
#   --min-port=$COTURN_RELAY_MIN --max-port=$COTURN_RELAY_MAX
#   --realm=$TURN_REALM --static-auth-secret=$TURN_SECRET --external-ip=$PUBLIC_IP
listening-port=3478
use-auth-secret
fingerprint
no-tcp-relay
no-multicast-peers
no-cli
stale-nonce=600
total-quota=300
# Don't let TURN reach internal hosts (SSRF via relay):
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
log-file=stdout
simple-log
